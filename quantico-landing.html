<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Assistência técnica especializada em Belo Horizonte. Conserto de celular, notebook, tablet, TV e mais com orçamento rápido via WhatsApp.">
    <title>Quântico Digital | Assistência Técnica em BH - Orçamento em Minutos</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0c10;
            --panel: #13171d;
            --accent: #00e6c3;
            --gold: #d4af37;
            --text: #f0f0f0;
            --text-light: #a0a0a0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; line-height: 1.1; }
        
        .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
        
        /* Header */
        header {
            position: sticky;
            top: 0;
            background: rgba(10, 12, 16, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            z-index: 100;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-dot {
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent);
        }
        
        /* Hero */
        .hero {
            padding: 120px 0 100px;
            background: linear-gradient(135deg, #0a0c10, #1a1f2e);
            position: relative;
            overflow: hidden;
        }
        .hero-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 60px;
            align-items: center;
        }
        @media (min-width: 900px) {
            .hero-content { grid-template-columns: 1.1fr 0.9fr; }
        }
        .hero h1 {
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            margin-bottom: 24px;
        }
        .hero h1 span { color: var(--accent); }
        .hero p {
            font-size: 1.2rem;
            color: var(--text-light);
            max-width: 520px;
            margin-bottom: 32px;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
        }
        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0, 230, 195, 0.4);
        }
        
        /* Trust Bar */
        .trust-bar {
            background: #13171d;
            padding: 20px 0;
            border-top: 1px solid rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .trust-items {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        
        /* Services */
        .services {
            padding: 100px 0;
            background: var(--panel);
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }
        .service-card {
            background: #1c2129;
            border-radius: 16px;
            padding: 32px;
            border: 1px solid rgba(0, 230, 195, 0.15);
            transition: all 0.3s ease;
        }
        .service-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
        }
        
        /* Floating WhatsApp */
        .float-whatsapp {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.5);
            z-index: 1000;
            text-decoration: none;
        }
        
        /* Outros estilos podem ser expandidos conforme necessário */
    </style>
</head>
<body>

<header>
    <nav class="container">
